name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Verify no UTF-8 BOM on .ps1 files
        # BOM causes irm | iex to fail — PowerShell receives the BOM as a
        # literal U+FEFF character prepended to the first token.
        # All .ps1 files must be plain UTF-8 (no BOM).
        run: |
          failed=()
          while IFS= read -r f; do
            if [ "$(head -c 3 "$f" | od -An -tx1 | tr -d ' \n')" = "efbbbf" ]; then
              failed+=("$f")
            fi
          done < <(git ls-files '*.ps1')
          if [ ${#failed[@]} -gt 0 ]; then
            echo "::error::PowerShell scripts have UTF-8 BOM (breaks irm | iex):"
            printf '  %s\n' "${failed[@]}"
            echo ""
            echo "Fix: python3 -c \"import sys; d=open(f,'rb').read(); open(f,'wb').write(d[3:] if d.startswith(b'\\xef\\xbb\\xbf') else d)\""
            exit 1
          fi
          echo "All .ps1 files are BOM-free"

      - name: Verify no non-ASCII characters in .ps1 files
        # Non-ASCII chars (decorative Unicode, em dashes, box-drawing) break
        # irm | iex on systems where PowerShell reads the response as ANSI.
        # Keep all .ps1 files strictly ASCII.
        run: |
          failed=()
          while IFS= read -r f; do
            if LC_ALL=C grep -Pq '[^\x00-\x7F]' "$f"; then
              failed+=("$f")
            fi
          done < <(git ls-files '*.ps1')
          if [ ${#failed[@]} -gt 0 ]; then
            echo "::error::PowerShell scripts contain non-ASCII characters:"
            printf '  %s\n' "${failed[@]}"
            echo ""
            LC_ALL=C grep -Pn '[^\x00-\x7F]' "${failed[@]}"
            exit 1
          fi
          echo "All .ps1 files are ASCII-clean"

      - run: npm ci
      - run: npx tsc --noEmit

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        shard: [1, 2, 3, 4, 5, 6]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test -- --shard=${{ matrix.shard }}/6

  build:
    runs-on: ubuntu-latest
    needs: [lint, test]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run --workspace=dashboard build

      - name: Commit rebuilt dashboard dist
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config user.name "shrok-ci"
          git config user.email "ashley@shrok.ai"
          git add dashboard/dist
          if git diff --cached --quiet; then
            echo "dashboard/dist unchanged — nothing to commit"
          else
            git commit -m "chore(ci): rebuild dashboard dist [skip ci]"
            git push
          fi

      - name: Security audit
        run: npm audit --audit-level=high 2>&1 | tee /tmp/audit.txt; exit ${PIPESTATUS[0]}
        continue-on-error: true
      - name: Fail on new vulnerabilities
        run: |
          # Known CVEs with no upstream fix — update this list when resolved
          KNOWN_CVES="tar|cmake-js"
          # Strip known CVEs and check if any unknown ones remain
          if grep -E "^[a-z@]" /tmp/audit.txt | grep -vE "$KNOWN_CVES" | grep -q "Severity: high\|Severity: critical"; then
            echo "::error::New high/critical vulnerabilities found beyond known allowlist"
            cat /tmp/audit.txt
            exit 1
          fi
